<button
    type="button"
    class="owner-mobile-toggle"
    data-owner-sidebar-toggle
    aria-controls="ownerSidebar"
    aria-expanded="false"
    aria-label="Buka sidebar Owner"
>
    <span></span>
</button>

<div class="owner-sidebar-overlay" data-owner-sidebar-overlay hidden></div>

<aside class="owner-sidebar" id="ownerSidebar" data-owner-sidebar>
    <button
        type="button"
        class="brand"
        data-owner-sidebar-toggle
        aria-controls="ownerSidebar"
        aria-expanded="true"
        aria-label="Perkecil sidebar Owner"
    >
        <img src="{{ url_for('static', filename='assets/logo-coffee.png') }}" alt="" class="brand-logo-mark">
        <span class="brand-name owner-sidebar__text">Kyloffee</span>
    </button>

    <nav class="owner-nav" aria-label="Owner navigation">
        <a
            href="{{ url_for('owner_menu') }}"
            class="owner-nav__link {% if active_page == 'menu' %}active{% endif %}"
            data-owner-nav-link
            data-tooltip="Menu Management"
            title="Menu Management"
        >
            <span class="owner-nav__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M4 5h16M4 12h16M4 19h16" />
                </svg>
            </span>
            <span class="owner-nav__text owner-sidebar__text">Menu Management</span>
        </a>

        <a
            href="{{ url_for('owner_categories') }}"
            class="owner-nav__link {% if active_page == 'categories' %}active{% endif %}"
            data-owner-nav-link
            data-tooltip="Category Management"
            title="Category Management"
        >
            <span class="owner-nav__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M5 6h5v5H5zM14 6h5v5h-5zM5 15h5v3H5zM14 15h5v3h-5z" />
                </svg>
            </span>
            <span class="owner-nav__text owner-sidebar__text">Category Management</span>
        </a>

        <a
            href="{{ url_for('owner_reports') }}"
            class="owner-nav__link {% if active_page == 'reports' %}active{% endif %}"
            data-owner-nav-link
            data-tooltip="Financial Reports"
            title="Financial Reports"
        >
            <span class="owner-nav__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M5 19V9M12 19V5M19 19v-7" />
                </svg>
            </span>
            <span class="owner-nav__text owner-sidebar__text">Financial Reports</span>
        </a>

        <a
            href="{{ url_for('owner_staff') }}"
            class="owner-nav__link {% if active_page == 'staff' %}active{% endif %}"
            data-owner-nav-link
            data-tooltip="Cashier Management"
            title="Cashier Management"
        >
            <span class="owner-nav__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M8 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM16.5 10a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5ZM3.5 19c.7-3.1 2.2-5 4.5-5s3.8 1.9 4.5 5M13.5 18c.5-2.3 1.6-3.7 3.2-3.7 1.8 0 3 1.5 3.8 3.7" />
                </svg>
            </span>
            <span class="owner-nav__text owner-sidebar__text">Cashier Management</span>
        </a>
    </nav>

    <a href="{{ url_for('logout') }}" class="owner-logout" data-owner-logout data-tooltip="Log Out" title="Log Out">
        <span class="owner-logout__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
                <path d="M10 5H5v14h5M14 8l4 4-4 4M18 12H9" />
            </svg>
        </span>
        <span class="owner-sidebar__text">Log Out</span>
    </a>
</aside>

<script src="{{ url_for('static', filename='js/owner_shell.js') }}?v=sidebar-1" defer></script>
